<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Flabelum — Artifacts of Intent</title>
<meta name="description" content="Flabelum: joyas de autor forjadas a mano. Artifacts of intent. Poética, orfebrería, meditación sobre la forma, la materia y el proceso.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFFFF;
    --ink:#000000;
    --ink-soft:#555555;
    --surface:#FAFAFA;
    --title:'Archivo Black', sans-serif;
    --display:'Space Grotesk', sans-serif;
    --elegant:'Cormorant Garamond', serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:var(--elegant);font-size:19px;line-height:1.65;
  }
  a{color:inherit;}
  img{max-width:100%;display:block;}

  header.site-nav{
    position:sticky;top:0;z-index:60;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 5vw;background:var(--paper);
    border-bottom:2px solid var(--ink);
  }
  .logo-mark{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-mark img{height:36px;width:auto;}
  nav.links{display:flex;gap:30px;font-family:var(--display);font-size:0.82rem;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;}
  nav.links a{text-decoration:none;color:var(--ink);position:relative;padding-bottom:3px;}
  nav.links a::after{
    content:"";position:absolute;left:0;right:0;bottom:-3px;height:2px;background:var(--ink);
    transform:scaleX(0);transform-origin:left;transition:transform .25s ease;
  }
  nav.links a:hover::after, nav.links a:focus-visible::after{transform:scaleX(1);}

  /* ---------- Frieze (Animación eliminada) ---------- */
  .frieze{
    background:var(--ink);color:var(--paper);
    overflow:hidden;white-space:nowrap;padding:11px 0;
  }
  .frieze-inner{display:flex;width:max-content;}
  .frieze-block{display:flex;align-items:center;flex:none;}
  .frieze-block span.item{
    font-family:var(--display);font-size:0.8rem;letter-spacing:0.1em;
    text-transform:uppercase;font-weight:500;padding:0 14px;flex:none;
  }
  .frieze-block .dot{display:none;}

  /* ---------- Hero (Estático, color corregido) ---------- */
  .hero{
    position:relative;overflow:hidden;
    display:grid;grid-template-columns:1fr 1fr;align-items:center;
    min-height:min(70vw,600px);
    padding:0 6vw;
  }
  .hero-mark-wrap{
    position:relative;display:flex;justify-content:center;align-items:center;
  }
  .hero-mark-wrap .ring{
    position:absolute;width:min(42vw,460px);height:min(42vw,460px);
  }
  .hero-mark-wrap img.logo-big{
    position:relative;width:min(30vw,320px);
  }
  .hero-copy{position:relative;z-index:2;}
  .hero-copy .brand{
    font-family:var(--title);font-size:clamp(2.6rem,7vw,4.6rem);
    letter-spacing:0.02em;margin:0 0 14px;line-height:0.95;text-transform:uppercase;
  }
  .hero-copy .tagline{
    font-family:var(--display);text-transform:uppercase;letter-spacing:0.18em;
    font-size:0.85rem;font-weight:500;margin:0 0 22px;color:var(--ink-soft);
  }
  .hero-copy .credo{
    font-family:var(--elegant);font-style:italic;font-size:1.3rem;
    max-width:420px;color:var(--ink-soft);margin:0;
  }
  .arrow-cue{display:flex;justify-content:center;padding:8px 0 44px;}
  .arrow-cue a{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;color:var(--ink-soft);}
  .arrow-cue span{font-family:var(--display);font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;}

  section{padding:70px 6vw;}
  .section-head{
    display:flex;align-items:baseline;gap:16px;margin-bottom:40px;
    border-bottom:2px solid var(--ink);padding-bottom:16px;
  }
  .section-head .mark{width:14px;height:14px;border-radius:50%;background:var(--ink);flex:none;}
  .section-head h2{
    font-family:var(--title);font-size:1.5rem;letter-spacing:0.01em;margin:0;text-transform:uppercase;
  }

  /* ---------- El resto del CSS se mantiene igual ---------- */
  #tienda{background:var(--surface);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px;max-width:1200px;margin:0 auto;background:var(--ink);border:2px solid var(--ink);}
  .piece{background:var(--surface);transition:background .2s ease;}
  .piece:hover{background:var(--paper);}
  .piece .thumb{aspect-ratio:1/1;overflow:hidden;border-bottom:2px solid var(--ink);}
  .piece .thumb img{width:100%;height:100%;object-fit:cover;}
  .piece .info{padding:18px 20px 22px;}
  .piece .info .cat{font-family:var(--display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-soft);margin:0 0 6px;}
  .piece .info .name{font-family:var(--display);font-weight:700;font-size:1.02rem;letter-spacing:0.01em;margin:0 0 6px;text-transform:uppercase;}
  .piece .info .desc{font-family:var(--elegant);font-size:1.05rem;color:var(--ink-soft);margin:0 0 10px;font-style:italic;}
  .piece .info .price-row{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px;}
  .piece .info .price{font-family:var(--display);font-weight:700;font-size:0.95rem;}
  .piece .info .status{font-family:var(--display);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;border:1px solid var(--ink);padding:3px 8px;color:var(--ink-soft);}
  .piece .info a.cta{font-family:var(--display);font-size:0.74rem;text-transform:uppercase;letter-spacing:0.06em;font-weight:500;text-decoration:none;color:var(--ink);border-bottom:2px solid var(--ink);padding-bottom:2px;}
  
  #sobre{display:grid;grid-template-columns:0.8fr 1.2fr;gap:56px;align-items:center;max-width:1200px;margin:0 auto;padding:80px 6vw;}
  #sobre .about-img{border:2px solid var(--ink);}
  #sobre .about-text .mark-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  #sobre .about-text .mark-row .dot{width:12px;height:12px;border-radius:50%;background:var(--ink);}
  #sobre .about-text .mark-row span.label{font-family:var(--display);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;}
  #sobre .about-text h2{font-family:var(--title);font-size:1.7rem;letter-spacing:0.01em;margin:0 0 20px;text-transform:uppercase;}
  #sobre .about-text p{font-family:var(--elegant);font-size:1.15rem;color:var(--ink-soft);margin:0 0 16px;}
  #sobre .about-text p.credo-line{color:var(--ink);font-style:italic;border-left:3px solid var(--ink);padding-left:16px;}

  #sobre-mi{background:var(--surface);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);}
  .aboutme-grid{display:grid;grid-template-columns:0.7fr 1.3fr;gap:56px;align-items:center;max-width:1100px;margin:0 auto;}
  .aboutme-grid img{border:2px solid var(--ink);}
  .aboutme-grid p{font-family:var(--elegant);font-size:1.15rem;color:var(--ink-soft);margin:0 0 16px;}
  .aboutme-grid .signature{font-family:var(--elegant);font-style:italic;font-size:1.2rem;color:var(--ink);}

  #faq{background:var(--paper);}
  .faq-list{max-width:760px;margin:0 auto;}
  details{border-bottom:1px solid var(--ink);padding:20px 0;}
  details:first-child{border-top:1px solid var(--ink);}
  summary{cursor:pointer;font-family:var(--display);font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:0.01em;list-style:none;display:flex;justify-content:space-between;align-items:center;}
  summary::-webkit-details-marker{display:none;}
  summary::after{content:"+";font-family:var(--display);font-size:1.3rem;}
  details[open] summary::after{content:"–";}
  details p{font-family:var(--elegant);font-size:1.1rem;color:var(--ink-soft);margin:14px 0 0;max-width:600px;}

  #pagos{background:var(--surface);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);}
  .pay-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;max-width:900px;margin:0 auto;}
  .pay-btn{display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);padding:20px 16px;text-decoration:none;color:var(--ink);font-family:var(--display);font-weight:700;font-size:0.95rem;letter-spacing:0.02em;text-transform:uppercase;transition:background .2s ease, color .2s ease;text-align:center;}
  .pay-btn:hover{background:var(--ink);color:var(--paper);}
  .pay-note{max-width:900px;margin:20px auto 0;font-family:var(--elegant);font-style:italic;color:var(--ink-soft);font-size:1rem;text-align:center;}

  #catalogo{background:var(--paper);}
  .catalog-box{max-width:700px;margin:0 auto;text-align:center;border:2px solid var(--ink);padding:50px 6vw;}
  .catalog-box p{font-family:var(--elegant);font-size:1.1rem;color:var(--ink-soft);margin:0 0 26px;}
  .catalog-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
  .catalog-actions a{font-family:var(--display);font-weight:700;font-size:0.85rem;letter-spacing:0.04em;text-transform:uppercase;text-decoration:none;padding:14px 26px;border:2px solid var(--ink);color:var(--ink);transition:background .2s ease, color .2s ease;}
  .catalog-actions a.primary{background:var(--ink);color:var(--paper);}
  .catalog-actions a.primary:hover{opacity:0.8;}
  .catalog-actions a:not(.primary):hover{background:var(--ink);color:var(--paper);}

  #instagram{background:var(--surface);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);}
  .ig-wrap{max-width:1000px;margin:0 auto;}
  .ig-wrap iframe{width:100%;border:none;display:block;}
  .ig-fallback{text-align:center;padding:40px 20px;border:1px dashed var(--ink-soft);font-family:var(--elegant);color:var(--ink-soft);font-style:italic;}

  footer{padding:50px 6vw 36px;display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between;align-items:center;}
  footer .fmark{display:flex;align-items:center;gap:10px;}
  footer .fmark img{height:26px;width:auto;}
  footer .socials{display:flex;gap:22px;align-items:center;}
  footer .socials a{text-decoration:none;color:var(--ink);display:flex;align-items:center;}
  footer .socials img{height:20px;width:auto;}

  @media (max-width:820px){
    .hero{grid-template-columns:1fr;text-align:center;padding-top:50px;}
    .hero-copy .credo{margin:0 auto;}
    .hero-mark-wrap{order:-1;margin-bottom:20px;}
    #sobre, .aboutme-grid{grid-template-columns:1fr;}
  }
  @media (max-width:520px){nav.links{display:none;}}
</style>
</head>
<body>

<header class="site-nav">
  <a href="#top" class="logo-mark" aria-label="Flabelum — inicio">
    <img src="assets/logo.png" alt="Flabelum">
  </a>
  <nav class="links">
    <a href="#tienda">Tienda</a>
    <a href="#instagram">Instagram</a>
    <a href="#sobre-mi">Sobre mí</a>
    <a href="#pagos">Pagos</a>
    <a href="#faq">FAQ</a>
    <a href="https://www.instagram.com/flabelum" target="_blank" rel="noopener">Instagram</a>
  </nav>
</header>

<div class="frieze" aria-hidden="true">
  <div class="frieze-inner" id="friezeInner">
    <div class="frieze-block" id="friezeBlockA"></div>
    <div class="frieze-block" id="friezeBlockB"></div>
  </div>
</div>

<main id="top">
  <section class="hero">
    <div class="hero-copy">
      <p class="brand">Flabelum</p>
      <p class="tagline">Artifacts of Intent</p>
      <p class="credo">Joyas de autor forjadas a mano.</p>
    </div>
    <div class="hero-mark-wrap">
      <svg class="ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="94" fill="none" stroke="#000" stroke-width="1.4" stroke-dasharray="1 10" stroke-linecap="round"/>
      </svg>
      <img class="logo-big" src="assets/logo.png" alt="Flabelum">
    </div>
  </section>
<!-- ... resto del cuerpo igual ... -->
